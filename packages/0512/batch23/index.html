<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气球大作战</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #1a1a2e;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .score-display, .timer-display {
            font-size: 32px;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .timer-display {
            color: #ffd700;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 30, 0.92);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over-overlay.active {
            display: flex;
        }

        .game-over-title {
            font-size: 72px;
            font-weight: 900;
            color: #ff6b6b;
            text-shadow: 4px 4px 0 #c92a2a, 8px 8px 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .final-score {
            font-size: 48px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 50px;
            text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.5);
        }

        .play-again-btn {
            font-family: 'Nunito', sans-serif;
            font-size: 28px;
            font-weight: 900;
            padding: 18px 60px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #51cf66, #2f9e44);
            color: white;
            cursor: pointer;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 8px 25px rgba(47, 158, 68, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            pointer-events: auto;
        }

        .play-again-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(47, 158, 68, 0.6);
        }

        .play-again-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div class="score-display">得分: <span id="score">0</span></div>
        <div class="timer-display">时间: <span id="timer">60</span></div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-title">游戏结束!</div>
        <div class="final-score">最终得分: <span id="finalScore">0</span></div>
        <button class="play-again-btn" id="playAgainBtn">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const playAgainBtn = document.getElementById('playAgainBtn');

        const BALLOON_COLORS = [
            { main: '#ff6b6b', shadow: '#c92a2a' },
            { main: '#4dabf7', shadow: '#1971c2' },
            { main: '#51cf66', shadow: '#2f9e44' },
            { main: '#ffd43b', shadow: '#f59f00' },
            { main: '#da77f2', shadow: '#9c36b5' },
            { main: '#ff922b', shadow: '#e8590c' }
        ];

        const GOLDEN_BALLOON = { main: '#ffd700', shadow: '#b8860b' };
        const BOMB_BALLOON = { main: '#2d2d2d', shadow: '#1a1a1a', fuse: '#ff4444' };

        function lightenColor(hex, percent) {
            const num = parseInt(hex.slice(1), 16);
            const r = Math.min(255, (num >> 16) + percent);
            const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
            const b = Math.min(255, (num & 0x0000FF) + percent);
            return `rgb(${r}, ${g}, ${b})`;
        }

        class Balloon {
            constructor(type, x, y, radius, color, speed, wobbleOffset, wobbleSpeed, wobbleAmount) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.speed = speed;
                this.wobbleOffset = wobbleOffset;
                this.wobbleSpeed = wobbleSpeed;
                this.wobbleAmount = wobbleAmount;
                this.type = type;
                this.active = true;
            }

            getWobbleX() {
                return Math.sin(this.wobbleOffset) * this.wobbleAmount;
            }

            update(deltaTime) {
                this.y -= this.speed * deltaTime * 0.06;
                this.wobbleOffset += this.wobbleSpeed * deltaTime * 0.06;
            }

            isOffScreen() {
                return this.y < -this.radius * 2;
            }

            containsPoint(px, py) {
                const wobbleX = this.getWobbleX();
                const dx = px - (this.x + wobbleX);
                const dy = py - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius + 10;
            }

            getPoints() {
                if (this.type === 'golden') return 20;
                if (this.type === 'bomb') return -20;
                if (this.radius > 38) return 15;
                if (this.radius < 30) return 5;
                return 10;
            }

            draw(ctx) {
                const wobbleX = this.getWobbleX();
                ctx.save();
                ctx.translate(this.x + wobbleX, this.y);

                if (this.type === 'bomb') {
                    this.drawBomb(ctx);
                } else {
                    this.drawNormal(ctx);
                }

                ctx.restore();
            }

            drawBomb(ctx) {
                const gradient = ctx.createRadialGradient(
                    -this.radius * 0.3, -this.radius * 0.3, 0,
                    0, 0, this.radius
                );
                gradient.addColorStop(0, '#4a4a4a');
                gradient.addColorStop(0.5, this.color.main);
                gradient.addColorStop(1, this.color.shadow);

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-this.radius * 0.35, -this.radius * 0.35, this.radius * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(0, -this.radius);
                ctx.lineTo(-3, -this.radius - 12);
                ctx.lineTo(3, -this.radius - 12);
                ctx.closePath();
                ctx.fillStyle = '#8b4513';
                ctx.fill();

                const fuseGlow = (Math.sin(Date.now() * 0.01) + 1) / 2;
                ctx.beginPath();
                ctx.arc(0, -this.radius - 15, 4 + fuseGlow * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, ${100 + fuseGlow * 100}, 50, ${0.8 + fuseGlow * 0.2})`;
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(0, this.radius);
                ctx.quadraticCurveTo(2, this.radius + 15, 0, this.radius + 30);
                ctx.strokeStyle = this.color.shadow;
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            drawNormal(ctx) {
                const gradient = ctx.createRadialGradient(
                    -this.radius * 0.3, -this.radius * 0.3, 0,
                    0, 0, this.radius
                );
                gradient.addColorStop(0, lightenColor(this.color.main, 40));
                gradient.addColorStop(0.5, this.color.main);
                gradient.addColorStop(1, this.color.shadow);

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                if (this.type === 'golden') {
                    const sparkleTime = Date.now() * 0.003;
                    for (let i = 0; i < 4; i++) {
                        const angle = sparkleTime + (Math.PI / 2) * i;
                        const sx = Math.cos(angle) * this.radius * 0.7;
                        const sy = Math.sin(angle) * this.radius * 0.7;
                        const sparkleSize = 2 + Math.sin(sparkleTime * 2 + i) * 1.5;

                        ctx.beginPath();
                        ctx.arc(sx, sy, sparkleSize, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                        ctx.fill();
                    }
                }

                ctx.beginPath();
                ctx.arc(-this.radius * 0.35, -this.radius * 0.35, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(0, this.radius);
                ctx.quadraticCurveTo(2, this.radius + 15, 0, this.radius + 30);
                ctx.strokeStyle = this.color.shadow;
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }

        class BalloonManager {
            constructor(canvas) {
                this.canvas = canvas;
                this.balloons = [];
                this.spawnInterval = 600;
                this.lastSpawnTime = 0;
                this.pool = [];
            }

            createBalloon() {
                const rand = Math.random();
                const radius = 20 + Math.random() * 25;
                const x = radius + Math.random() * (this.canvas.width - radius * 2);
                const y = this.canvas.height + radius;

                if (rand < 0.08) {
                    return new Balloon(
                        'golden', x, y, radius, GOLDEN_BALLOON,
                        4 + Math.random() * 2,
                        Math.random() * Math.PI * 2,
                        0.04 + Math.random() * 0.02,
                        2 + Math.random() * 2
                    );
                } else if (rand < 0.15) {
                    return new Balloon(
                        'bomb', x, y, radius * 0.9, BOMB_BALLOON,
                        2 + Math.random() * 2,
                        Math.random() * Math.PI * 2,
                        0.015 + Math.random() * 0.015,
                        0.5 + Math.random() * 1
                    );
                }

                const colorSet = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
                return new Balloon(
                    'normal', x, y, radius, colorSet,
                    2 + Math.random() * 3,
                    Math.random() * Math.PI * 2,
                    0.02 + Math.random() * 0.03,
                    1 + Math.random() * 2
                );
            }

            spawn(currentTime) {
                if (currentTime - this.lastSpawnTime > this.spawnInterval) {
                    this.balloons.push(this.createBalloon());
                    this.lastSpawnTime = currentTime;

                    if (Math.random() < 0.3) {
                        setTimeout(() => {
                            this.balloons.push(this.createBalloon());
                        }, 200);
                    }
                }
            }

            update(deltaTime) {
                for (let i = this.balloons.length - 1; i >= 0; i--) {
                    const balloon = this.balloons[i];
                    balloon.update(deltaTime);

                    if (balloon.isOffScreen()) {
                        this.balloons.splice(i, 1);
                    }
                }
            }

            draw(ctx) {
                this.balloons.forEach(balloon => balloon.draw(ctx));
            }

            checkHit(x, y) {
                for (let i = this.balloons.length - 1; i >= 0; i--) {
                    const balloon = this.balloons[i];
                    if (balloon.containsPoint(x, y)) {
                        this.balloons.splice(i, 1);
                        return balloon;
                    }
                }
                return null;
            }

            clear() {
                this.balloons = [];
                this.lastSpawnTime = 0;
            }
        }

        class Particle {
            constructor(x, y, vx, vy, radius, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
                this.color = color;
                this.life = 1;
            }

            update(deltaTime) {
                this.x += this.vx * deltaTime * 0.06;
                this.y += this.vy * deltaTime * 0.06;
                this.vy += 0.15 * deltaTime * 0.06;
                this.life -= 0.025 * deltaTime * 0.06;
            }

            isDead() {
                return this.life <= 0;
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color.main;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class ParticleManager {
            constructor() {
                this.particles = [];
            }

            createExplosion(x, y, color, count = 12) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 / count) * i;
                    const speed = 3 + Math.random() * 4;
                    this.particles.push(new Particle(
                        x, y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        3 + Math.random() * 4,
                        color
                    ));
                }
            }

            createBombExplosion(x, y) {
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 5;
                    this.particles.push(new Particle(
                        x, y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        4 + Math.random() * 6,
                        { main: `hsl(${Math.random() * 40 + 10}, 100%, 50%)` }
                    ));
                }
            }

            update(deltaTime) {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const particle = this.particles[i];
                    particle.update(deltaTime);

                    if (particle.isDead()) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            draw(ctx) {
                this.particles.forEach(particle => particle.draw(ctx));
            }

            clear() {
                this.particles = [];
            }
        }

        class Renderer {
            constructor(ctx, canvas) {
                this.ctx = ctx;
                this.canvas = canvas;
            }

            clear() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            drawBackground() {
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(0.5, '#B0E0E6');
                gradient.addColorStop(1, '#E0F7FA');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                for (let i = 0; i < 50; i++) {
                    const x = (i * 137.5) % this.canvas.width;
                    const y = (i * 97.3) % this.canvas.height;
                    const size = 2 + (i % 3);
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, size, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }

            render(balloonManager, particleManager) {
                this.clear();
                this.drawBackground();
                balloonManager.draw(this.ctx);
                particleManager.draw(this.ctx);
            }
        }

        class Game {
            constructor() {
                this.canvas = canvas;
                this.ctx = ctx;
                this.balloonManager = new BalloonManager(this.canvas);
                this.particleManager = new ParticleManager();
                this.renderer = new Renderer(this.ctx, this.canvas);

                this.score = 0;
                this.timeLeft = 60;
                this.gameRunning = false;
                this.lastTime = 0;
                this.animationId = null;
                this.timerInterval = null;

                this.init();
            }

            init() {
                this.resizeCanvas();
                this.bindEvents();
                this.start();
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            bindEvents() {
                this.canvas.addEventListener('click', (e) => this.handleClick(e));
                playAgainBtn.addEventListener('click', () => this.start());
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            handleClick(e) {
                if (!this.gameRunning) return;

                const rect = this.canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;

                const hitBalloon = this.balloonManager.checkHit(clickX, clickY);
                if (hitBalloon) {
                    const wobbleX = hitBalloon.getWobbleX();

                    if (hitBalloon.type === 'bomb') {
                        this.score = Math.max(0, this.score - 20);
                        this.timeLeft = Math.max(1, this.timeLeft - 5);
                        this.particleManager.createBombExplosion(
                            hitBalloon.x + wobbleX, hitBalloon.y
                        );
                    } else {
                        const points = hitBalloon.getPoints();
                        this.score += points;
                        this.particleManager.createExplosion(
                            hitBalloon.x + wobbleX, hitBalloon.y, hitBalloon.color
                        );
                    }

                    this.updateUI();
                }
            }

            updateUI() {
                scoreDisplay.textContent = this.score;
                timerDisplay.textContent = this.timeLeft;

                if (this.timeLeft <= 10) {
                    timerDisplay.style.color = '#ff6b6b';
                } else {
                    timerDisplay.style.color = '#ffd700';
                }
            }

            gameLoop(currentTime) {
                if (!this.gameRunning) return;

                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;

                this.balloonManager.spawn(currentTime);
                this.balloonManager.update(deltaTime);
                this.particleManager.update(deltaTime);
                this.renderer.render(this.balloonManager, this.particleManager);

                this.animationId = requestAnimationFrame((t) => this.gameLoop(t));
            }

            start() {
                this.balloonManager.clear();
                this.particleManager.clear();
                this.score = 0;
                this.timeLeft = 60;
                this.gameRunning = true;
                this.lastTime = performance.now();

                scoreDisplay.textContent = '0';
                timerDisplay.textContent = '60';
                gameOverOverlay.classList.remove('active');
                timerDisplay.style.color = '#ffd700';

                if (this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    this.updateUI();

                    if (this.timeLeft <= 0) {
                        this.end();
                    }
                }, 1000);

                if (this.animationId) cancelAnimationFrame(this.animationId);
                this.animationId = requestAnimationFrame((t) => this.gameLoop(t));
            }

            end() {
                this.gameRunning = false;
                clearInterval(this.timerInterval);
                cancelAnimationFrame(this.animationId);

                finalScoreDisplay.textContent = this.score;
                gameOverOverlay.classList.add('active');
                timerDisplay.style.color = '#ffd700';
            }
        }

        const game = new Game();
    </script>
</body>
</html>
