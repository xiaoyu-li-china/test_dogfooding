[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "summarize"
version = "0.1.0"
authors = [
  { name="Your Name", email="your.email@example.com" }
]
description = "A CLI tool for text summarization using BART model"
requires-python = ">=3.8"
dependencies = [
  "transformers>=4.0.0",
  "torch>=1.0.0",
]

[project.scripts]
summarize = "summarize:main"
