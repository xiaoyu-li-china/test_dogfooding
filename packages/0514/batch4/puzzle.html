<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 拼图游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 20px;
        }
        .stat {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        canvas {
            border: 3px solid #667eea;
            border-radius: 10px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-undo {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-undo:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(56, 239, 125, 0.4);
        }
        .btn-undo:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-hint {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-hint:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-hint:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .hint-cost {
            font-size: 12px;
            margin-left: 5px;
            opacity: 0.8;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal h2 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 20px;
        }
        .modal p {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }
        .modal-stats {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .instructions {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .image-selector {
            text-align: center;
            margin-bottom: 20px;
        }
        .image-selector button {
            padding: 8px 15px;
            font-size: 14px;
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 3x3 拼图游戏</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">步数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">时间</div>
                <div class="stat-value" id="timer">00:00</div>
            </div>
        </div>
        <div class="instructions">点击空白块相邻的拼图块进行移动</div>
        <canvas id="puzzleCanvas" width="450" height="450"></canvas>
        <div class="controls">
            <button class="btn-primary" id="restartBtn">重新开始</button>
            <button class="btn-undo" id="undoBtn">撤销</button>
            <button class="btn-hint" id="hintBtn">提示<span class="hint-cost">(-10步)</span></button>
            <button class="btn-secondary" id="previewBtn">预览原图</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 恭喜你赢了！</h2>
            <p>你成功完成了拼图！</p>
            <div class="modal-stats">
                <p><strong>总步数：</strong><span id="finalMoves">0</span></p>
                <p><strong>总时间：</strong><span id="finalTime">00:00</span></p>
            </div>
            <button class="btn-primary" id="playAgainBtn">再玩一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('puzzleCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 3;
        const tileSize = canvas.width / gridSize;
        let tiles = [];
        let emptyTile = { row: 2, col: 2 };
        let moves = 0;
        let seconds = 0;
        let timerInterval = null;
        let gameStarted = false;
        let isWon = false;
        let hintTile = null;
        let hintTimeout = null;
        const HINT_COST = 10;
        let isAnimating = false;
        const ANIMATION_DURATION = 150;
        const MAX_UNDO_STEPS = 10;
        let history = [];

        const colors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1',
            '#96CEB4', '#FFEAA7', '#DDA0DD',
            '#98D8C8', '#F7DC6F', '#BB8FCE'
        ];

        function drawTile(row, col, number, isHint = false) {
            const x = col * tileSize;
            const y = row * tileSize;
            const colorIndex = row * gridSize + col;
            
            if (isHint) {
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(x - 2, y - 2, tileSize + 4, tileSize + 4);
                ctx.shadowBlur = 0;
            }
            
            ctx.fillStyle = colors[colorIndex];
            ctx.fillRect(x + 2, y + 2, tileSize - 4, tileSize - 4);
            
            ctx.strokeStyle = isHint ? '#FFD700' : '#fff';
            ctx.lineWidth = isHint ? 4 : 2;
            ctx.strokeRect(x + 2, y + 2, tileSize - 4, tileSize - 4);
            
            if (number !== 0) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(number.toString(), x + tileSize / 2, y + tileSize / 2);
            } else {
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(x + 2, y + 2, tileSize - 4, tileSize - 4);
            }
        }

        function initTiles() {
            tiles = [];
            let number = 1;
            for (let row = 0; row < gridSize; row++) {
                tiles[row] = [];
                for (let col = 0; col < gridSize; col++) {
                    if (row === gridSize - 1 && col === gridSize - 1) {
                        tiles[row][col] = 0;
                    } else {
                        tiles[row][col] = number++;
                    }
                }
            }
            emptyTile = { row: 2, col: 2 };
        }

        function drawBoard() {
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const isHint = hintTile && hintTile.row === row && hintTile.col === col;
                    drawTile(row, col, tiles[row][col], isHint);
                }
            }
        }

        function isAdjacent(row, col) {
            const rowDiff = Math.abs(row - emptyTile.row);
            const colDiff = Math.abs(col - emptyTile.col);
            return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
        }

        function saveHistory() {
            const state = {
                tiles: tiles.map(row => [...row]),
                emptyTile: { ...emptyTile },
                moves: moves
            };
            history.push(state);
            if (history.length > MAX_UNDO_STEPS) {
                history.shift();
            }
            updateUndoButton();
        }

        function updateUndoButton() {
            const undoBtn = document.getElementById('undoBtn');
            undoBtn.disabled = history.length === 0;
        }

        function moveTile(row, col, isUndo = false) {
            if (isAnimating) return;
            if (isWon && !isUndo) return;
            if (!isAdjacent(row, col)) return;
            
            if (!isUndo) {
                saveHistory();
            }
            
            isAnimating = true;
            
            const startX = col * tileSize;
            const startY = row * tileSize;
            const endX = emptyTile.col * tileSize;
            const endY = emptyTile.row * tileSize;
            const number = tiles[row][col];
            
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / ANIMATION_DURATION, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                const currentX = startX + (endX - startX) * easeProgress;
                const currentY = startY + (endY - startY) * easeProgress;
                
                drawBoard();
                
                const colorIndex = row * gridSize + col;
                ctx.fillStyle = colors[colorIndex];
                ctx.fillRect(currentX + 2, currentY + 2, tileSize - 4, tileSize - 4);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(currentX + 2, currentY + 2, tileSize - 4, tileSize - 4);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(number.toString(), currentX + tileSize / 2, currentY + tileSize / 2);
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    tiles[emptyTile.row][emptyTile.col] = tiles[row][col];
                    tiles[row][col] = 0;
                    emptyTile = { row, col };
                    
                    if (!isUndo) {
                        moves++;
                        document.getElementById('moves').textContent = moves;
                        updateHintButton();
                        
                        if (!gameStarted) {
                            startTimer();
                            gameStarted = true;
                        }
                    }
                    
                    drawBoard();
                    isAnimating = false;
                    
                    if (!isUndo) {
                        checkWin();
                    }
                }
            }
            
            animate();
        }

        function shuffleTiles() {
            resetGame();
            const shuffleMoves = 100;
            for (let i = 0; i < shuffleMoves; i++) {
                const neighbors = getNeighbors(emptyTile.row, emptyTile.col);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                
                tiles[emptyTile.row][emptyTile.col] = tiles[randomNeighbor.row][randomNeighbor.col];
                tiles[randomNeighbor.row][randomNeighbor.col] = 0;
                emptyTile = randomNeighbor;
            }
            drawBoard();
        }

        function getNeighbors(row, col) {
            const neighbors = [];
            if (row > 0) neighbors.push({ row: row - 1, col });
            if (row < gridSize - 1) neighbors.push({ row: row + 1, col });
            if (col > 0) neighbors.push({ row, col: col - 1 });
            if (col < gridSize - 1) neighbors.push({ row, col: col + 1 });
            return neighbors;
        }

        function checkWin() {
            let number = 1;
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    if (row === gridSize - 1 && col === gridSize - 1) {
                        if (tiles[row][col] !== 0) return;
                    } else {
                        if (tiles[row][col] !== number++) return;
                    }
                }
            }
            isWon = true;
            stopTimer();
            showWinModal();
        }

        function getTargetPosition(number) {
            if (number === 0) return { row: 2, col: 2 };
            const index = number - 1;
            return {
                row: Math.floor(index / gridSize),
                col: index % gridSize
            };
        }

        function calculateManhattanDistance() {
            let distance = 0;
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const number = tiles[row][col];
                    if (number !== 0) {
                        const target = getTargetPosition(number);
                        distance += Math.abs(row - target.row) + Math.abs(col - target.col);
                    }
                }
            }
            return distance;
        }

        function findBestMove() {
            const neighbors = getNeighbors(emptyTile.row, emptyTile.col);
            let bestMove = null;
            let bestDistance = Infinity;
            
            for (const neighbor of neighbors) {
                const tempEmpty = { ...emptyTile };
                const tempTile = tiles[neighbor.row][neighbor.col];
                
                tiles[tempEmpty.row][tempEmpty.col] = tempTile;
                tiles[neighbor.row][neighbor.col] = 0;
                emptyTile = neighbor;
                
                const distance = calculateManhattanDistance();
                
                tiles[neighbor.row][neighbor.col] = tempTile;
                tiles[tempEmpty.row][tempEmpty.col] = 0;
                emptyTile = tempEmpty;
                
                if (distance < bestDistance) {
                    bestDistance = distance;
                    bestMove = neighbor;
                }
            }
            
            return bestMove;
        }

        function showHint() {
            if (moves < HINT_COST) {
                alert(`步数不足！需要 ${HINT_COST} 步才能使用提示`);
                return;
            }
            
            const bestMove = findBestMove();
            if (!bestMove) return;
            
            moves -= HINT_COST;
            document.getElementById('moves').textContent = moves;
            updateHintButton();
            
            hintTile = bestMove;
            drawBoard();
            
            if (hintTimeout) clearTimeout(hintTimeout);
            hintTimeout = setTimeout(() => {
                hintTile = null;
                drawBoard();
            }, 2000);
        }

        function updateHintButton() {
            const hintBtn = document.getElementById('hintBtn');
            hintBtn.disabled = moves < HINT_COST;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
        }

        function undo() {
            if (history.length === 0 || isAnimating) return;
            
            const prevState = history.pop();
            tiles = prevState.tiles.map(row => [...row]);
            emptyTile = { ...prevState.emptyTile };
            moves = prevState.moves;
            
            document.getElementById('moves').textContent = moves;
            updateHintButton();
            updateUndoButton();
            
            if (isWon) {
                isWon = false;
                hideWinModal();
            }
            
            drawBoard();
        }

        function restartGame() {
            if (isAnimating) return;
            resetGame();
            shuffleTiles();
        }

        function resetGame() {
            stopTimer();
            seconds = 0;
            moves = 0;
            gameStarted = false;
            isWon = false;
            history = [];
            document.getElementById('moves').textContent = '0';
            document.getElementById('timer').textContent = '00:00';
            updateUndoButton();
            initTiles();
        }

        function showWinModal() {
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = document.getElementById('timer').textContent;
            document.getElementById('winModal').style.display = 'flex';
        }

        function hideWinModal() {
            document.getElementById('winModal').style.display = 'none';
        }

        function getTilePosition(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            return {
                col: Math.floor(x / tileSize),
                row: Math.floor(y / tileSize)
            };
        }

        canvas.addEventListener('click', (e) => {
            const pos = getTilePosition(e);
            moveTile(pos.row, pos.col);
        });

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    moveTile(emptyTile.row + 1, emptyTile.col);
                    break;
                case 'ArrowDown':
                    moveTile(emptyTile.row - 1, emptyTile.col);
                    break;
                case 'ArrowLeft':
                    moveTile(emptyTile.row, emptyTile.col + 1);
                    break;
                case 'ArrowRight':
                    moveTile(emptyTile.row, emptyTile.col - 1);
                    break;
            }
        });

        const hammer = new Hammer(canvas);
        hammer.get('swipe').set({ direction: Hammer.DIRECTION_ALL });

        hammer.on('swipe', (e) => {
            switch (e.direction) {
                case Hammer.DIRECTION_UP:
                    moveTile(emptyTile.row + 1, emptyTile.col);
                    break;
                case Hammer.DIRECTION_DOWN:
                    moveTile(emptyTile.row - 1, emptyTile.col);
                    break;
                case Hammer.DIRECTION_LEFT:
                    moveTile(emptyTile.row, emptyTile.col + 1);
                    break;
                case Hammer.DIRECTION_RIGHT:
                    moveTile(emptyTile.row, emptyTile.col - 1);
                    break;
            }
        });

        hammer.on('tap', (e) => {
            const pos = getTilePosition(e.srcEvent);
            moveTile(pos.row, pos.col);
        });

        document.getElementById('restartBtn').addEventListener('click', restartGame);
        document.getElementById('undoBtn').addEventListener('click', undo);
        
        document.getElementById('previewBtn').addEventListener('mousedown', () => {
            initTiles();
            drawBoard();
        });
        
        document.getElementById('previewBtn').addEventListener('mouseup', () => {
            drawBoard();
        });
        
        document.getElementById('previewBtn').addEventListener('mouseleave', () => {
            drawBoard();
        });

        document.getElementById('playAgainBtn').addEventListener('click', () => {
            hideWinModal();
            shuffleTiles();
        });

        document.getElementById('hintBtn').addEventListener('click', showHint);

        initTiles();
        drawBoard();
        updateHintButton();
        setTimeout(shuffleTiles, 500);
    </script>
</body>
</html>
