name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  build:
    name: Build ${{ matrix.target }}
    needs: audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            use-cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            use-cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            use-cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            use-cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            use-cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            use-cross: false

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Archive (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BINARY_NAME=imgc
          if [ "${{ runner.os }}" = "Windows" ]; then
            BINARY_NAME=imgc.exe
          fi
          cd target/${{ matrix.target }}/release
          tar -czvf imgc-${{ matrix.target }}.tar.gz $BINARY_NAME

      - name: Archive (Windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path imgc.exe -DestinationPath imgc-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgc-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/imgc-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            imgc-*/imgc-*.*
          generate_release_notes: true
          draft: false
          prerelease: false
