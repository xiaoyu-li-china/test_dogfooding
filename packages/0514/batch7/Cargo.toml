[package]
name = "imgc"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4", features = ["derive"] }
flate2 = "1.0"
rayon = "1.10"
walkdir = "2"
anyhow = "1.0"
tempfile = "3"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
image = { version = "0.25", features = ["webp", "avif"] }
once_cell = "1.21"
