<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频录制 - 修复最后一帧丢失和内存溢出</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .video-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }
        video {
            width: 100%;
            background: #000;
            aspect-ratio: 16/9;
            display: block;
        }
        #annotationCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #annotationCanvas.active {
            pointer-events: auto;
            cursor: crosshair;
        }
        .annotation-toolbar {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .tool-btn {
            padding: 8px 16px;
            font-size: 14px;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tool-btn:hover {
            background: #e9ecef;
        }
        .tool-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .color-picker {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 2px;
        }
        .size-slider {
            width: 100px;
            cursor: pointer;
        }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-warning {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: white;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .status {
            text-align: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .status.recording {
            background: #fff3cd;
            color: #856404;
        }
        .status-item {
            display: inline-block;
            margin: 0 15px;
        }
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .info-box h3 {
            color: #1976D2;
            margin-bottom: 8px;
        }
        .info-box ul {
            margin-left: 20px;
            color: #555;
        }
        .info-box li {
            margin: 5px 0;
        }
        .segment-list {
            max-height: 200px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
        }
        .segment-item {
            padding: 8px 12px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .segment-item:last-child {
            border-bottom: none;
        }
        .segment-size {
            color: #6c757d;
            font-size: 14px;
        }
        .recording-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #dc3545;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .settings {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .setting-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .setting-group label {
            font-weight: 500;
        }
        .setting-group input, .setting-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            border-left: 2px solid #dee2e6;
        }
        .tool-group:first-child {
            border-left: none;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 视频录制修复演示 + 实时标注</h1>
        
        <div class="card">
            <div class="info-box">
                <h3>🔧 功能说明</h3>
                <ul>
                    <li><strong>最后一帧丢失修复：</strong>使用 MediaRecorder.requestDataFrame() 在停止前强制获取最后一帧数据</li>
                    <li><strong>内存溢出修复：</strong>实现分段录制，每段录制一定时间（可配置）自动保存并释放内存</li>
                    <li><strong>实时标注：</strong>支持绘制箭头、矩形、文字标注，实时显示在录制画面上</li>
                    <li><strong>鼠标高亮：</strong>录制时鼠标位置显示高亮光环效果</li>
                </ul>
            </div>

            <div class="settings">
                <div class="setting-group">
                    <label>分段时长（秒）：</label>
                    <input type="number" id="segmentDuration" value="30" min="5" max="300">
                </div>
                <div class="setting-group">
                    <label>视频 MIME 类型：</label>
                    <select id="mimeType">
                        <option value="video/webm;codecs=vp9">video/webm (VP9</option>
                        <option value="video/webm;codecs=vp8">video/webm (VP8)</option>
                        <option value="video/mp4">video/mp4</option>
                    </select>
                </div>
            </div>

            <div class="status" id="status">
                <span class="status-item">状态：等待开始录制</span>
                <span class="status-item">录制时长：<span id="recordingTime">00:00:00</span></span>
                <span class="status-item">分段数量：<span id="segmentCount">0</span></span>
                <span class="status-item">内存使用：<span id="memoryUsage">0 MB</span></span>
            </div>

            <div class="annotation-toolbar" id="annotationToolbar">
                <div class="tool-group">
                    <button class="tool-btn" data-tool="select" title="选择">
                        👆 选择
                    </button>
                    <button class="tool-btn" data-tool="arrow" title="箭头">
                        ➡️ 箭头
                    </button>
                    <button class="tool-btn" data-tool="rect" title="矩形">
                        ⬜ 矩形
                    </button>
                    <button class="tool-btn" data-tool="text" title="文字">
                        📝 文字
                    </button>
                </div>
                <div class="tool-group">
                    <button class="tool-btn" id="mouseHighlightBtn" data-tool="highlight" title="鼠标高亮">
                        🔦 高亮
                    </button>
                </div>
                <div class="tool-group">
                    <label>颜色：</label>
                    <input type="color" class="color-picker" id="strokeColor" value="#ff0000">
                </div>
                <div class="tool-group">
                    <label>粗细：</label>
                    <input type="range" class="size-slider" id="strokeWidth" min="1" max="10" value="3">
                </div>
                <div class="tool-group">
                    <button class="tool-btn" id="clearAnnotationsBtn" title="清除所有标注">
                        🗑️ 清除
                    </button>
                </div>
            </div>

            <div class="video-container">
                <div>
                    <h4 style="margin-bottom: 10px; text-align: center;">📹 预览画面（含标注）</h4>
                    <div class="video-wrapper" id="previewWrapper">
                        <video id="previewVideo" autoplay muted playsinline></video>
                        <canvas id="annotationCanvas"></canvas>
                    </div>
                </div>
                <div>
                    <h4 style="margin-bottom: 10px; text-align: center;">▶️ 回放录制</h4>
                    <video id="playbackVideo" controls playsinline></video>
                </div>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn-primary">🎥 开始录制</button>
                <button id="stopBtn" class="btn-danger" disabled>⏹️ 停止录制</button>
                <button id="pauseBtn" class="btn-secondary" disabled>⏸️ 暂停</button>
                <button id="mergeBtn" class="btn-success" disabled>🔗 合并分段</button>
                <button id="downloadBtn" class="btn-primary" disabled>💾 下载视频</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 15px;">📦 录制分段列表</h3>
            <div class="segment-list" id="segmentList">
                <div style="text-align: center; color: #999; padding: 20px;">暂无分段</div>
            </div>
        </div>
    </div>

    <script src="recorder.js"></script>
</body>
</html>
