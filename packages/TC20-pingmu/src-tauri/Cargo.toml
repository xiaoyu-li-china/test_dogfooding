[package]
name = "screen-color-picker"
version = "1.0.0"
description = "屏幕取色器应用"
authors = ["you"]
edition = "2021"

[lib]
name = "screen_color_picker_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.5", features = [ "window-all", "shell-open", "global-shortcut", "system-tray"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.21"
screenshots = "0.8"
