<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理系统 - 短链接集成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h1 {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }

        .sidebar-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-top: 5px;
        }

        .sidebar-actions {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .article-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .article-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .article-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .article-item.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .article-title {
            color: white;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .article-meta {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
        }

        .status-published {
            background: #28a745;
            color: white;
        }

        .status-draft {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
        }

        .link-count {
            color: #f093fb;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .editor-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-header {
            padding: 20px 30px;
            border-bottom: 1px solid #e0e0e0;
            background: #f8f9fa;
        }

        .editor-header input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.3s;
        }

        .editor-header input:focus {
            border-color: #667eea;
        }

        .toolbar {
            padding: 15px 30px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            background: #fff;
        }

        .toolbar-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: #f5f5f5;
            border-color: #ccc;
        }

        .toolbar-btn.shorten-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .toolbar-btn.shorten-btn:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .toolbar-btn.restore-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
        }

        .toolbar-btn.restore-btn:hover {
            box-shadow: 0 4px 12px rgba(240, 147, 251, 0.4);
        }

        .toolbar-btn.publish-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
        }

        .toolbar-btn.publish-btn:hover {
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.4);
        }

        .toolbar-btn.delete-btn {
            background: #dc3545;
            color: white;
            border: none;
        }

        .toolbar-btn.delete-btn:hover {
            background: #c82333;
        }

        .toolbar-spacer {
            flex: 1;
        }

        .editor-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .rich-editor {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.8;
            outline: none;
        }

        .rich-editor:focus {
            outline: none;
        }

        .rich-editor a {
            color: #667eea;
            text-decoration: underline;
        }

        .rich-editor a.short-link {
            color: #f093fb;
            background: rgba(240, 147, 251, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .sidebar-panel {
            width: 320px;
            border-left: 1px solid #e0e0e0;
            padding: 20px;
            overflow-y: auto;
            background: #fafafa;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .link-mapping-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .mapping-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 3px;
        }

        .mapping-value {
            font-size: 12px;
            color: #333;
            word-break: break-all;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .mapping-value.short {
            color: #f093fb;
        }

        .mapping-arrow {
            text-align: center;
            color: #ccc;
            font-size: 14px;
            margin: 5px 0;
        }

        .stats-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #666;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #28a745;
        }

        .toast.error {
            background: #dc3545;
        }

        .toast.info {
            background: #17a2b8;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .modal p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .modal-btn.cancel {
            background: #e0e0e0;
            color: #333;
        }

        .modal-btn.confirm {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>内容管理系统</h1>
                <p>短链接自动集成</p>
            </div>
            <div class="sidebar-actions">
                <button class="btn-primary" id="newArticleBtn">+ 新建文章</button>
            </div>
            <div class="article-list" id="articleList"></div>
        </div>

        <div class="main-content">
            <div class="editor-container">
                <div class="editor-header">
                    <input type="text" id="titleInput" placeholder="输入文章标题...">
                </div>
                <div class="toolbar">
                    <button class="toolbar-btn" onclick="formatText('bold')"><b>B</b></button>
                    <button class="toolbar-btn" onclick="formatText('italic')"><i>I</i></button>
                    <button class="toolbar-btn" onclick="formatText('underline')"><u>U</u></button>
                    <button class="toolbar-btn" onclick="insertLink()">插入链接</button>
                    <button class="toolbar-btn shorten-btn" id="shortenBtn">批量转换短链接</button>
                    <button class="toolbar-btn restore-btn" id="restoreBtn">一键还原</button>
                    <div class="toolbar-spacer"></div>
                    <button class="toolbar-btn" id="saveBtn">保存</button>
                    <button class="toolbar-btn publish-btn" id="publishBtn">发布</button>
                    <button class="toolbar-btn delete-btn" id="deleteBtn">删除</button>
                </div>
                <div class="editor-body">
                    <div class="rich-editor" id="editor" contenteditable="true" placeholder="开始撰写您的文章...">
                        <p>欢迎使用内容管理系统！</p>
                        <p>您可以在文章中添加链接，发布时系统会自动将链接转换为短链接。</p>
                        <p>示例链接：</p>
                        <p><a href="https://www.google.com">Google 搜索</a></p>
                        <p><a href="https://www.github.com">GitHub</a></p>
                        <p><a href="https://www.example.com/path/to/page?query=1">复杂 URL 示例</a></p>
                    </div>
                    <div class="sidebar-panel" id="linkPanel">
                        <div class="panel-title">
                            <span class="stats-badge" id="linkCountBadge">0 个链接</span>
                        </div>
                        <div id="linkMappings"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>
    <div id="modalContainer"></div>

    <script>
        const API_BASE = '';
        let currentArticle = null;
        let currentMappings = [];
        let isSaving = false;

        const articleListEl = document.getElementById('articleList');
        const titleInput = document.getElementById('titleInput');
        const editor = document.getElementById('editor');
        const linkCountBadge = document.getElementById('linkCountBadge');
        const linkMappingsEl = document.getElementById('linkMappings');
        const shortenBtn = document.getElementById('shortenBtn');
        const restoreBtn = document.getElementById('restoreBtn');
        const saveBtn = document.getElementById('saveBtn');
        const publishBtn = document.getElementById('publishBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const newArticleBtn = document.getElementById('newArticleBtn');

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showModal(title, message, onConfirm) {
            const container = document.getElementById('modalContainer');
            container.innerHTML = `
                <div class="modal-overlay" id="modalOverlay">
                    <div class="modal">
                        <h2>${title}</h2>
                        <p>${message}</p>
                        <div class="modal-actions">
                            <button class="modal-btn cancel" id="cancelModal">取消</button>
                            <button class="modal-btn confirm" id="confirmModal">确认</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('cancelModal').onclick = () => container.innerHTML = '';
            document.getElementById('confirmModal').onclick = () => {
                container.innerHTML = '';
                onConfirm();
            };
        }

        function formatText(command) {
            document.execCommand(command, false, null);
            editor.focus();
        }

        function insertLink() {
            const url = prompt('请输入链接地址：');
            if (url) {
                document.execCommand('createLink', false, url);
            }
            editor.focus();
            updateLinkStats();
        }

        function extractUrlsFromEditor() {
            const links = editor.querySelectorAll('a');
            const urls = [];
            links.forEach(link => {
                if (link.href && !urls.includes(link.href)) {
                    urls.push(link.href);
                }
            });
            return urls;
        }

        function updateLinkStats() {
            const urls = extractUrlsFromEditor();
            let shortCount = 0;
            const mappings = [];
            
            if (currentArticle && currentArticle.link_mappings) {
                const shortUrls = currentArticle.link_mappings.map(m => m.short_url);
                const links = editor.querySelectorAll('a');
                links.forEach(link => {
                    if (shortUrls.includes(link.href)) {
                        shortCount++;
                        link.classList.add('short-link');
                    }
                });
            }

            linkCountBadge.textContent = `${urls.length} 个链接`;
            
            if (currentArticle && currentArticle.link_mappings && currentArticle.link_mappings.length > 0) {
                linkMappingsEl.innerHTML = currentArticle.link_mappings.map((m, i) => `
                    <div class="link-mapping-item">
                        <div class="mapping-label">原始链接 #${i + 1}</div>
                        <div class="mapping-value">${m.original_url}</div>
                        <div class="mapping-arrow">↓</div>
                        <div class="mapping-label">短链接</div>
                        <div class="mapping-value short">${m.short_url}</div>
                    </div>
                `).join('');
            } else {
                linkMappingsEl.innerHTML = `
                    <div class="empty-state" style="padding: 30px 10px;">
                        <p style="font-size: 13px;">暂无链接映射</p>
                        <p style="font-size: 11px; margin-top: 5px;">点击「批量转换短链接」开始</p>
                    </div>
                `;
            }
        }

        async function loadArticles() {
            try {
                const response = await fetch(`${API_BASE}/articles`);
                const articles = await response.json();
                
                if (articles.length === 0) {
                    articleListEl.innerHTML = `
                        <div class="empty-state" style="color: rgba(255,255,255,0.5); padding: 30px 10px;">
                            <p>暂无文章</p>
                            <p style="font-size: 12px; margin-top: 5px;">点击上方按钮创建第一篇文章</p>
                        </div>
                    `;
                    return;
                }

                articleListEl.innerHTML = articles.map(article => `
                    <div class="article-item ${currentArticle && currentArticle.id === article.id ? 'active' : ''}" 
                         data-id="${article.id}">
                        <div class="article-title">${escapeHtml(article.title)}</div>
                        <div class="article-meta">
                            <span class="status-badge ${article.published ? 'status-published' : 'status-draft'}">
                                ${article.published ? '已发布' : '草稿'}
                            </span>
                            <span class="link-count">${article.link_mappings.length} 个短链</span>
                        </div>
                    </div>
                `).join('');

                articleListEl.querySelectorAll('.article-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const id = parseInt(item.dataset.id);
                        const article = articles.find(a => a.id === id);
                        if (article) {
                            loadArticle(article);
                        }
                    });
                });
            } catch (error) {
                console.error('加载文章列表失败:', error);
                showToast('加载文章列表失败', 'error');
            }
        }

        async function loadArticle(article) {
            currentArticle = article;
            currentMappings = article.link_mappings || [];
            
            titleInput.value = article.title;
            editor.innerHTML = article.content;
            
            updateLinkStats();
            await loadArticles();
            showToast('文章已加载', 'success');
        }

        function createNewArticle() {
            currentArticle = null;
            currentMappings = [];
            titleInput.value = '';
            editor.innerHTML = '<p></p>';
            updateLinkStats();
            loadArticles();
            showToast('新建文章', 'info');
        }

        async function batchShorten() {
            const content = editor.innerHTML;
            const title = titleInput.value.trim();

            if (!title) {
                showToast('请先输入文章标题', 'error');
                return;
            }

            shortenBtn.disabled = true;
            shortenBtn.innerHTML = '<span class="loading"></span> 转换中...';

            try {
                const response = await fetch(`${API_BASE}/articles/replace-preview`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });

                const result = await response.json();
                
                if (result.success) {
                    editor.innerHTML = result.content;
                    
                    if (currentArticle) {
                        currentArticle.content = result.content;
                        currentArticle.link_mappings = result.short_links;
                    }
                    
                    currentMappings = result.short_links;
                    updateLinkStats();
                    
                    showToast(`成功转换 ${result.replaced_count}/${result.original_count} 个链接`, 'success');
                }
            } catch (error) {
                console.error('转换失败:', error);
                showToast('转换失败，请检查短链接服务是否运行', 'error');
            } finally {
                shortenBtn.disabled = false;
                shortenBtn.textContent = '批量转换短链接';
            }
        }

        async function restoreUrls() {
            if (!currentArticle || !currentArticle.link_mappings || currentArticle.link_mappings.length === 0) {
                showToast('当前文章没有可还原的短链接', 'info');
                return;
            }

            restoreBtn.disabled = true;
            restoreBtn.innerHTML = '<span class="loading"></span> 还原中...';

            try {
                const response = await fetch(`${API_BASE}/articles/${currentArticle.id}/restore`, {
                    method: 'POST'
                });

                const result = await response.json();
                
                if (result.success) {
                    editor.innerHTML = result.content;
                    showToast(`成功还原 ${result.restored_count} 个链接`, 'success');
                }
            } catch (error) {
                console.error('还原失败:', error);
                showToast('还原失败', 'error');
            } finally {
                restoreBtn.disabled = false;
                restoreBtn.textContent = '一键还原';
            }
        }

        async function saveArticle() {
            const title = titleInput.value.trim();
            const content = editor.innerHTML;

            if (!title) {
                showToast('请输入文章标题', 'error');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="loading"></span> 保存中...';
            isSaving = true;

            try {
                let response;
                if (currentArticle) {
                    response = await fetch(`${API_BASE}/articles/${currentArticle.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content })
                    });
                } else {
                    response = await fetch(`${API_BASE}/articles`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content })
                    });
                }

                const article = await response.json();
                currentArticle = article;
                currentMappings = article.link_mappings || [];
                updateLinkStats();
                await loadArticles();
                showToast('文章已保存', 'success');
            } catch (error) {
                console.error('保存失败:', error);
                showToast('保存失败', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存';
                isSaving = false;
            }
        }

        async function publishArticle() {
            if (!currentArticle) {
                await saveArticle();
                if (!currentArticle) return;
            }

            publishBtn.disabled = true;
            publishBtn.innerHTML = '<span class="loading"></span> 发布中...';

            try {
                const response = await fetch(`${API_BASE}/articles/${currentArticle.id}/publish`, {
                    method: 'POST'
                });

                const article = await response.json();
                currentArticle = article;
                await loadArticles();
                showToast('文章已发布！', 'success');
            } catch (error) {
                console.error('发布失败:', error);
                showToast('发布失败', 'error');
            } finally {
                publishBtn.disabled = false;
                publishBtn.textContent = '发布';
            }
        }

        async function deleteArticle() {
            if (!currentArticle) {
                showToast('请先选择要删除的文章', 'info');
                return;
            }

            showModal(
                '确认删除',
                `确定要删除文章「${currentArticle.title}」吗？此操作不可恢复。`,
                async () => {
                    try {
                        await fetch(`${API_BASE}/articles/${currentArticle.id}`, {
                            method: 'DELETE'
                        });
                        createNewArticle();
                        showToast('文章已删除', 'success');
                    } catch (error) {
                        console.error('删除失败:', error);
                        showToast('删除失败', 'error');
                    }
                }
            );
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        newArticleBtn.addEventListener('click', createNewArticle);
        shortenBtn.addEventListener('click', batchShorten);
        restoreBtn.addEventListener('click', restoreUrls);
        saveBtn.addEventListener('click', saveArticle);
        publishBtn.addEventListener('click', publishArticle);
        deleteBtn.addEventListener('click', deleteArticle);

        editor.addEventListener('input', updateLinkStats);

        loadArticles();
        updateLinkStats();
    </script>
</body>
</html>
